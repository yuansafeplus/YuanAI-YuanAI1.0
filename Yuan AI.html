<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YuanAI Internet</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
background:#111827;
padding:15px;
border-radius:10px;
}

.header{
font-size:20px;
margin-bottom:10px;
}

.chat{
height:260px;
overflow-y:auto;
background:#0b1220;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.input-area{
display:flex;
gap:5px;
margin-top:5px;
}

input{
flex:1;
padding:8px;
border:none;
border-radius:5px;
}

button{
padding:8px;
border:none;
background:#2563eb;
color:white;
border-radius:5px;
cursor:pointer;
}

img{
width:100%;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
<div class="header">YuanAI Internet</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="entry" placeholder="Ask anything...">
<button onclick="sendMessage()">Send</button>
</div>

<div class="input-area">
<input id="imgPrompt" placeholder="Generate image...">
<button onclick="generateImage()">Image</button>
</div>

<div class="input-area">
<button onclick="getWeather()">Weather</button>
<button onclick="searchWeb()">Search</button>
</div>

<img id="imgOut">

</div>

<script>

/* ================= MEMORY ================= */
let memory = JSON.parse(localStorage.getItem("yuanai_memory") || "{}");

function saveMemory(){
localStorage.setItem("yuanai_memory", JSON.stringify(memory));
}


/* ================= CHAT ================= */
function addMessage(user, text){
let chat = document.getElementById("chat");
let p = document.createElement("p");
p.textContent = user + ": " + text;
chat.appendChild(p);
chat.scrollTop = chat.scrollHeight;
}


/* ================= INTENT DETECTOR ================= */
function detectIntent(msg){

msg = msg.toLowerCase();

/* WEATHER */
if(msg.includes("weather")) return "weather";

/* WIKI / INFO */
if(msg.includes("what is") || msg.includes("who is") || msg.includes("wiki"))
return "wiki";

/* SEARCH */
if(msg.includes("search") || msg.includes("google") || msg.includes("find"))
return "search";

/* MATH */
if(/^[0-9+\-*/(). ]+$/.test(msg)) return "math";

/* NAME */
if(msg.includes("my name")) return "memory";

/* DEFAULT */
return "chat";
}


/* ================= AI ENGINE ================= */
async function getAIReply(message){

let msg = message.trim();
let intent = detectIntent(msg);


/* ================= MEMORY ================= */
if(intent === "memory"){

if(msg.toLowerCase().includes("my name is")){
let name = msg.replace(/my name is/i,"").trim();
memory.name = name;
saveMemory();
return "Nice to meet you " + name;
}

return memory.name ? "Your name is " + memory.name : "I don't know your name yet";
}


/* ================= WEATHER ================= */
if(intent === "weather"){

let match = msg.match(/in (.+)/i);
let city = match ? match[1].trim() : msg.replace("weather","").trim();

if(!city) return "Try: weather in Cagayan de Oro";

let geo = await fetch(
"https://geocoding-api.open-meteo.com/v1/search?name=" +
encodeURIComponent(city)
);

let g = await geo.json();
if(!g.results) return "City not found";

let lat = g.results[0].latitude;
let lon = g.results[0].longitude;

let w = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
);

let data = await w.json();

if(!data.current_weather) return "Weather unavailable";

return "🌦️ Weather in " + city + ": " +
data.current_weather.temperature + "°C";
}


/* ================= WIKI ================= */
if(intent === "wiki"){

let topic = msg
.replace("what is","")
.replace("who is","")
.replace("wiki","")
.trim();

if(!topic) return "Try: what is AI";

let res = await fetch(
"https://en.wikipedia.org/api/rest_v1/page/summary/" +
encodeURIComponent(topic)
);

let data = await res.json();

if(!data.extract || data.title === "Not found."){
return "No info found for: " + topic;
}

return "📘 " + data.extract;
}


/* ================= SEARCH ================= */
if(intent === "search"){

let q = msg.replace(/search|google|find/gi,"").trim();

if(!q) return "Try: search cats";

window.open(
"https://duckduckgo.com/?q=" + encodeURIComponent(q),
"_blank"
);

return "🔍 Searching for: " + q;
}


/* ================= MATH ================= */
if(intent === "math"){
try{
return "🧮 " + Function('"use strict";return (' + msg + ')')();
}catch{
return "Invalid math";
}
}


/* ================= SMART CHAT FALLBACK ================= */
if(msg.includes("hello")) return "Hello! I'm YuanAI Ultra 🤖";

if(msg.includes("your name")) return "I'm YuanAI Ultra AI Version";

return `According to me -> The "best" movie often depends on your mood, but here are some:
- The Super Mario Galaxy the Movie
- Lee Cronin's The Mummy

If you ask more of them? Just ask me instead of searching :)`;

if(msg.includes("yuanylms"))
return `Yuanylms also known as Yuan Manuel Sarmiento and he is a alias content creator, producer and singer and a creator of Yuan AI. Also known as Prod by Yuan, the creator is active across several digital platforms:
- BandLab (Yuan recently post Hip-Hop genre content and also a video tutorial on how to produce music)

- YouTube (Yuan post several Roblox walkthroughs and tutorials and then Yuan post YMLS group media broadcast ready post @ymlsgroup media)
If you like more Yuanylms social medias like facebook and TikTok? Just ask me instead of searching :)`;

if(msg.includes("sara duterte impeachment"))
return `In the Philippines, the House panel hearings are the top story. People are searching for the "live stream of impeachment hearing" and updates on "Duterte joint bank accounts." But I don't trust them very much.
Why:
- I declare that this statement is not continue
- My feeling as an ai is the hearing in the Philippines are suck (not all of them either).

If you frequenly ask about Rodrigo Duterte at ICC and how to bring him home? Just ask me directly :) I'll get updates on other social media sources!`;

if(msg.includes("upcat 2026 results"))
return `UPCAT results are insane!! 
according to me - Education searches are spiking as the University of the Philippines released its latest entrance exam results today.
If you ever find University of the Philippines entrance exam results? Then, ask me :)`;

if(msg.includes("earth day mobilization"))
return `According to me, large-scale protests and climate rallies are trending, particularly near major embassies and government buildings.
The Earth Day 2026 mobilization is massive this year. With the theme "Our Power, Our Planet," the focus has shifted from just asking governments for change to showing how communities and individuals are taking the lead themselves.

/* DEFAULT */
return "I can help with weather, wiki, search, math, and memory.";
}


/* ================= SEND ================= */
async function sendMessage(){

let entry = document.getElementById("entry");
let text = entry.value;

if(!text.trim()) return;

addMessage("You", text);

let reply = await getAIReply(text);

addMessage("YuanAI Ultra 1.0", reply);

entry.value = "";
}


/* ================= IMAGE ================= */
function generateImage(){
let prompt = document.getElementById("imgPrompt").value;
let img = document.getElementById("imgOut");

if(!prompt.trim()) return;

img.src = "https://image.pollinations.ai/prompt/" +
encodeURIComponent(prompt);
}


/* ================= SEARCH BUTTON ================= */
function searchWeb(){
let q = document.getElementById("entry").value;
if(!q.trim()) return;

window.open(
"https://duckduckgo.com/?q=" + encodeURIComponent(q),
"_blank"
);
}


/* ================= WEATHER SHORTCUT ================= */
function getWeather(){
let city = document.getElementById("entry").value;
if(!city.trim()) return;

document.getElementById("entry").value = "weather in " + city;
sendMessage();
}

</script>
</body>
</html>
